<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">StartNest 项目封面</title>
  <desc id="description">StartNest 私人起始页与书签工作台的深色界面封面，展示时钟、搜索、书签分组和侧边导航。</desc>

  <defs>
    <linearGradient id="background" x1="70" y1="20" x2="1530" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070B14"/>
      <stop offset="0.55" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111C2D"/>
    </linearGradient>
    <linearGradient id="frame" x1="548" y1="95" x2="1528" y2="805" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172033"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="sidebar" x1="548" y1="95" x2="650" y2="805" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172235"/>
      <stop offset="1" stop-color="#0E1728"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#182338"/>
      <stop offset="1" stop-color="#111A2A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1270 330) rotate(133) scale(620 510)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.19"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="0" cy="0" r="1" gradientTransform="translate(160 690) rotate(-31) scale(480 340)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#1D4ED8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#BAE6FD" stroke-opacity="0.035"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#020617" flood-opacity="0.62"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <filter id="cyanGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="appClip">
      <rect x="548" y="95" width="980" height="710" rx="34"/>
    </clipPath>
  </defs>

  <rect width="1600" height="900" fill="url(#background)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <rect width="760" height="900" fill="url(#leftGlow)"/>

  <g fill="none" stroke="#7DD3FC" stroke-linecap="round">
    <path d="M-105 693C62 543 211 535 390 620" stroke-opacity="0.06" stroke-width="2"/>
    <path d="M-70 748C95 605 250 602 430 690" stroke-opacity="0.045"/>
    <path d="M1110 -102C1296 9 1421 115 1649 108" stroke-opacity="0.055" stroke-width="2"/>
  </g>

  <g>
