  <text x="100" y="466" fill="#7F91A8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">把常用入口、搜索与 Web 面板，</text>
  <text x="100" y="495" fill="#7F91A8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">安放在属于自己的云端。</text>

