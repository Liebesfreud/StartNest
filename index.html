<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>StartNest</title>
    <style>
      :root {
        color-scheme: light;
        background-color: #ffffff;
        color: #0a0a0a;
      }

      :root.dark {
        color-scheme: dark;
        background-color: #0b0b0b;
        color: #fafafa;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background-color: inherit;
        color: inherit;
      }
    </style>
    <script>
      ;(() => {
        const storageKey = 'startnest:theme-mode'
        const darkThemeColor = '#0b0b0b'
        const lightThemeColor = '#ffffff'

        const resolveTheme = (mode) => {
          if (mode === 'dark') return 'dark'
          if (mode === 'light') return 'light'

          return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }

        try {
          const mode = localStorage.getItem(storageKey)
          const theme = resolveTheme(mode)
          const isDark = theme === 'dark'
          const root = document.documentElement
          root.classList.toggle('dark', isDark)

          const themeColor = document.querySelector('meta[name="theme-color"]')
          themeColor?.setAttribute('content', isDark ? darkThemeColor : lightThemeColor)
        } catch {
          const isDark = resolveTheme('system') === 'dark'
          const root = document.documentElement
          root.classList.toggle('dark', isDark)

          const themeColor = document.querySelector('meta[name="theme-color"]')
          themeColor?.setAttribute('content', isDark ? darkThemeColor : lightThemeColor)
        }
      })()
    </script>
  </head>
  <body class="min-h-screen bg-background text-foreground antialiased selection:bg-primary/20">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
